name: 24-7 Animex Zone Icecast Streamer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Tools & Icecast
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ffmpeg curl icecast2

    - name: Configure and Start Icecast Server
      run: |
        echo "Setting up Icecast Config..."
        # Icecast ko background mein bina kisi password tension ke run karna
        icecast2 -b -c /etc/icecast2/icecast.xml
        sleep 5
        echo "Icecast Server is successfully running on port 8000!"

    - name: Start Serveo Public Tunnel
      run: |
        echo "Exposing Icecast Server to Internet via Serveo..."
        # Port 8000 ko direct internet par secure link ke sath forward karna
        ssh -o StrictHostKeyChecking=no -R 80:127.0.0.1:8000 serveo.net > serveo.log 2>&1 &
        sleep 10
        echo "--------------------------------------------------------"
        echo "🚀 AAPKA VLC LIVE LINK NEECHE HAI (Aakhri Line Dekhein) 🚀"
        echo "--------------------------------------------------------"
        cat serveo.log || true

    - name: Infinite FFmpeg Video Loop
      run: |
        echo "Starting Video Stream Input into Icecast Server..."
        while true; do
          count=1
          grep -E '^https?://' playlist.m3u | while read -r url; do
            filename="video_${count}.mp4"
            echo "Downloading Video $count from GitHub Releases..."
            
            curl -L "$url" -o "$filename"
            
            if [ -f "$filename" ] && [ -s "$filename" ]; then
              echo "Video $count downloaded! Pushing stream to Icecast..."
              
              # Icecast local mountpoint (/live) par stream update karna
              ffmpeg -re -i "$filename" -i logo.png \
              -filter_complex "[1:v]scale=120:-1[logo];[0:v][logo]overlay=W-w-10:10" \
              -c:v libx264 -preset veryfast -b:v 1000k -maxrate 1000k -bufsize 2000k \
              -c:a aac -b:a 128k -ar 44100 \
              -f mpegts icecast://source:hackme@127.0.0.1:8000/live || echo "Moving next..."
            else
              echo "Error downloading Video $count"
            fi
            
            rm -f "$filename"
            count=$((count+1))
          done
          sleep 5
        done
