name: 24-7 Animex Zone Direct Playlist Generator

on:
  workflow_dispatch:

jobs:
  generate-playlist:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Create Live M3U Playlist File
      run: |
        echo "Generating high-speed direct stream playlist..."
        
        # Ek makkhan public playlist file create karna bina kisi server ya port dependency ke
        echo "#EXTM3U" > animex_zone_live.m3u
        
        count=1
        grep -E '^https?://' playlist.m3u | while read -r url; do
          echo "#EXTINF:-1, Animex Zone Video $count" >> animex_zone_live.m3u
          echo "$url" >> animex_zone_live.m3u
          count=$((count+1))
        done
        
        echo "Playlist created successfully!"
        cat animex_zone_live.m3u

    - name: Upload Stream Playlist to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Animex-Zone-VLC-Stream
        path: animex_zone_live.m3u
