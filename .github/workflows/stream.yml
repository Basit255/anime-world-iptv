name: 24-7 Anime World IPTV Streamer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install FFmpeg and Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg curl unzip

    - name: Download and Install Localtonet
      run: |
        curl -L https://localtonet.com/download/localtonet-linux-x64.zip -o localtonet.zip
        unzip localtonet.zip
        chmod +x localtonet

    - name: Start Localtonet Tunnel
      env:
        LOCALTONET_AUTH_TOKEN: ${{ secrets.LOCALTONET_AUTH_TOKEN }}
      run: |
        ./localtonet -token $LOCALTONET_AUTH_TOKEN -protocol http -port 8080 > /dev/null 2>&1 &
        sleep 10

    - name: Download All Videos and Create Local Playlist
      run: |
        echo "Saari badi videos download ho rahi hain..."
        mkdir -p /home/runner/work/videos
        touch local_playlist.txt
        
        count=1
        grep -E '^https?://' playlist.m3u | while read -r link; do
          echo "Downloading video $count..."
          
          # Google Drive Bypass Download
          curl -L -c cookies.txt "$link" > confirm.html
          CONFIRM_CODE=$(grep -o 'confirm=[^&"]*' confirm.html | head -n 1)
          
          if [ ! -z "$CONFIRM_CODE" ]; then
            curl -L -b cookies.txt "${link}&${CONFIRM_CODE}" -o "/home/runner/work/videos/file_${count}.mp4"
          else
            curl -L -b cookies.txt "$link" -o "/home/runner/work/videos/file_${count}.mp4"
          fi
          
          # FFmpeg strict formatting with absolute path
          echo "file '/home/runner/work/videos/file_${count}.mp4'" >> local_playlist.txt
          count=$((count+1))
        done
        
        echo "Download Poora Hua! Playlist ki checking:"
        cat local_playlist.txt

    - name: Start 24/7 Multi-Video Stream
      run: |
        ffmpeg -re -f concat -safe 0 -stream_loop -1 -i local_playlist.txt -i logo.png \
        -filter_complex "[1:v]scale=120:-1[logo];[0:v][logo]overlay=W-w-10:10" \
        -c:v libx264 -preset veryfast -b:v 1500k -maxrate 1500k -bufsize 3000k \
        -c:a aac -b:a 128k -ar 44100 \
        -f mpegts http://127.0.0.1:8080/live
