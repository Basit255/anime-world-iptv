name: 24-7 Animex Zone Cloud Streamer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install FFmpeg and Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg curl unzip

    - name: Download and Install Localtonet
      run: |
        curl -L https://localtonet.com/download/localtonet-linux-x64.zip -o localtonet.zip
        unzip localtonet.zip
        chmod +x localtonet

    - name: Start Localtonet Tunnel
      env:
        LOCALTONET_TOKEN: ${{ secrets.LOCALTONET_TOKEN }}
      run: |
        echo "Starting Localtonet with Verified Secret Name..."
        ./localtonet -token $LOCALTONET_TOKEN -protocol http -port 8080 > localtonet.log 2>&1 &
        echo "Waiting 20 seconds for tunnel to open..."
        sleep 20
        cat localtonet.log || true

    - name: Direct Release Stream Loop
      run: |
        echo "Starting Direct GitHub Release Streamer..."
        while true; do
          count=1
          grep -E '^https?://' playlist.m3u | while read -r url; do
            filename="video_${count}.mp4"
            echo "Downloading Video $count from GitHub Releases..."
            
            curl -L "$url" -o "$filename"
            
            if [ -f "$filename" ] && [ -s "$filename" ]; then
              echo "Video $count downloaded successfully! Starting stream..."
              
              ffmpeg -re -i "$filename" -i logo.png \
              -filter_complex "[1:v]scale=120:-1[logo];[0:v][logo]overlay=W-w-10:10" \
              -c:v libx264 -preset veryfast -b:v 1200k -maxrate 1200k -bufsize 2400k \
              -c:a aac -b:a 128k -ar 44100 \
              -f mpegts http://127.0.0.1:8080/live || echo "Moving next..."
            else
              echo "Error downloading Video $count"
            fi
            
            rm -f "$filename"
            count=$((count+1))
          done
          sleep 5
        done
