name: 24-7 Animex Zone Direct Cloud Streamer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y curl nodejs

    - name: Start Ultimate Direct Server
      run: |
        echo "Creating Instant Live Stream Server..."
        
        # Ek makkhan chota server scripts banana bina kisi port failure ke
        cat << 'EOF' > server.js
        const http = require('http');
        const { exec } = require('child_process');
        
        const server = http.createServer((req, res) => {
          console.log("VLC Connected! Starting live feed...");
          res.writeHead(200, { 'Content-Type': 'video/mpjs', 'Connection': 'keep-alive' });
          
          // FFmpeg direct download aur logo overlay ko feed karega VLC mein
          const ffmpegCmd = `ffmpeg -re -i "https://github.com/Basit255/anime-world-iptv/releases/download/v1.0/Video.1" -i logo.png -filter_complex "[1:v]scale=120:-1[logo];[0:v][logo]overlay=W-w-10:10" -c:v libx264 -preset veryfast -b:v 1000k -c:a aac -b:a 128k -f mpegts pipe:1`;
          
          const ffmpeg = exec(ffmpegCmd);
          ffmpeg.stdout.pipe(res);
          
          req.on('close', () => {
            console.log("VLC Disconnected.");
            ffmpeg.kill();
          });
        });
        
        server.listen(8080, '0.0.0.0', () => {
          console.log("Server is ready on port 8080");
        });
        EOF
        
        node server.js &
        sleep 5
        
        echo "--------------------------------------------------------"
        echo "🚀 LOCAL TENSION KHATAM - SERVEO CONNECTING... 🚀"
        echo "--------------------------------------------------------"
        
        ssh -o StrictHostKeyChecking=no -R animexzone:80:127.0.0.1:8080 serveo.net
