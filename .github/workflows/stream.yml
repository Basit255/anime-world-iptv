name: 24-7 Animex Zone IPTV Streamer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install FFmpeg and Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg curl unzip

    - name: Download and Install Localtonet
      run: |
        curl -L https://localtonet.com/download/localtonet-linux-x64.zip -o localtonet.zip
        unzip localtonet.zip
        chmod +x localtonet

    - name: Start Localtonet Tunnel
      env:
        LOCALTONET_AUTH_TOKEN: ${{ secrets.LOCALTONET_AUTH_TOKEN }}
      run: |
        ./localtonet -token $LOCALTONET_AUTH_TOKEN -protocol http -port 8080 > /dev/null 2>&1 &
        sleep 10

    - name: Start 24/7 Animex Zone Stream
      run: |
        echo "Starting live stream with ANIMEX ZONE logo..."
        
        ffmpeg -re -f concat -safe 0 -stream_loop -1 \
        -protocol_whitelist file,http,https,tcp,tls \
        -headers "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
        -i playlist.m3u -i "https://i.ibb.co/6wG6YV6/logo.png" \
        -filter_complex "[1:v]scale=120:-1[logo];[0:v][logo]overlay=W-w-10:10" \
        -c:v libx264 -preset veryfast -b:v 1200k -maxrate 1200k -bufsize 2400k \
        -c:a aac -b:a 128k -ar 44100 \
        -f mpegts http://127.0.0.1:8080/live
