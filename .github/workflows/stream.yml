name: 24-7 Animex Zone Auto-Bypass Streamer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install FFmpeg and Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg curl unzip

    - name: Download and Install Localtonet
      run: |
        curl -L https://localtonet.com/download/localtonet-linux-x64.zip -o localtonet.zip
        unzip localtonet.zip
        chmod +x localtonet

    - name: Start Localtonet Tunnel
      env:
        LOCALTONET_AUTH_TOKEN: ${{ secrets.LOCALTONET_AUTH_TOKEN }}
      run: |
        ./localtonet -token $LOCALTONET_AUTH_TOKEN -protocol http -port 8080 > /dev/null 2>&1 &
        sleep 10

    - name: Smart Auto-Click Download & Stream
      run: |
        echo "Starting Google Drive Bypass Streamer..."
        
        while true; do
          count=1
          # playlist.m3u se sirf links nikalna
          grep -E '^https?://' playlist.m3u | while read -r url; do
            # URL se File ID alag karna
            FILE_ID=$(echo "$url" | grep -oP '(id=|/d/)\K[^&\s]+')
            filename="video_${count}.mp4"
            
            echo "Processing Video $count (ID: $FILE_ID)..."
            
            # Step 1: Google Drive par pehli request bhej kar cookies save karna
            curl -c cookies.txt -s -L "https://docs.google.com/uc?export=download&id=${FILE_ID}" > confirm.html
            
            # Step 2: "Download Anyway" button ka hidden confirmation code (token) nikalna
            CONFIRM=$(grep -o 'confirm=[^&"]*' confirm.html | head -n 1 | cut -d= -f2)
            
            # Step 3: Agar token mil jaye (Badi file ho), toh token ke sath download karna, warna direct download
            if [ ! -z "$CONFIRM" ]; then
              echo "Bypass Token Found! Clicking 'Download Anyway' automatically..."
              curl -b cookies.txt -c cookies.txt -L "https://docs.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -o "$filename"
            else
              echo "Small file or direct link. Downloading directly..."
              curl -b cookies.txt -L "https://docs.google.com/uc?export=download&id=${FILE_ID}" -o "$filename"
            fi
            
            # Step 4: Check karna ke asli video download hui ya nahi
            if [ -f "$filename" ] && [ -s "$filename" ]; then
              echo "Video $count downloaded successfully! Starting stream..."
              
              ffmpeg -re -i "$filename" -i "https://i.ibb.co/6wG6YV6/logo.png" \
              -filter_complex "[1:v]scale=120:-1[logo];[0:v][logo]overlay=W-w-10:10" \
              -c:v libx264 -preset veryfast -b:v 1200k -maxrate 1200k -bufsize 2400k \
              -c:a aac -b:a 128k -ar 44100 \
              -f mpegts http://127.0.0.1:8080/live || echo "Moving to next video"
            else
              echo "Error: Download failed for Video $count"
            fi
            
            # Safai taaki storage full na ho
            rm -f "$filename" confirm.html cookies.txt
            count=$((count+1))
          done
        done
