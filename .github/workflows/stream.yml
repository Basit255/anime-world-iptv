namename: 24-7 Animex Zone Ultimate Streamer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg curl

    - name: Start Direct Serveo Stream
      run: |
        echo "Starting Stream directly via Serveo Reverse Tunnel..."
        
        # Background SSH tunnel setup properly
        ssh -o StrictHostKeyChecking=no -R 80:127.0.0.1:8080 serveo.net > serveo.log 2>&1 &
        sleep 5
        cat serveo.log || true
        
        echo "Starting Video Loop..."
        while true; do
          count=1
          grep -E '^https?://' playlist.m3u | while read -r url; do
            filename="video_${count}.mp4"
            echo "Downloading Video $count from GitHub Releases..."
            
            curl -L "$url" -o "$filename"
            
            if [ -f "$filename" ] && [ -s "$filename" ]; then
              echo "Video $count downloaded! Pushing direct stream..."
              
              # Direct stream connection to the local port mapped with serveo
              ffmpeg -re -i "$filename" -i logo.png \
              -filter_complex "[1:v]scale=120:-1[logo];[0:v][logo]overlay=W-w-10:10" \
              -c:v libx264 -preset veryfast -b:v 1000k -maxrate 1000k -bufsize 2000k \
              -c:a aac -b:a 128k -ar 44100 \
              -f mpegts http://127.0.0.1:8080 || echo "Moving next..."
            else
              echo "Error downloading Video $count"
            fi
            
            rm -f "$filename"
            count=$((count+1))
          done
          sleep 2
        done
