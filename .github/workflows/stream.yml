name: 24-7 Animex Zone IPTV Streamer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install FFmpeg and Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg curl unzip python3-pip
        pip3 install gdown --break-system-packages

    - name: Download and Install Localtonet
      run: |
        curl -L https://localtonet.com/download/localtonet-linux-x64.zip -o localtonet.zip
        unzip localtonet.zip
        chmod +x localtonet

    - name: Start Localtonet Tunnel
      env:
        LOCALTONET_AUTH_TOKEN: ${{ secrets.LOCALTONET_AUTH_TOKEN }}
      run: |
        ./localtonet -token $LOCALTONET_AUTH_TOKEN -protocol http -port 8080 > /dev/null 2>&1 &
        sleep 10

    - name: Run Python Downloader and Streamer
      run: |
        cat << 'EOF' > stream_runner.py
        import os
        import subprocess
        import time

        def get_gdrive_id(url):
            # URL se file ID nikalne ka tareeqa
            if "id=" in url:
                return url.split("id=")[1].split("&")[0].strip()
            elif "file/d/" in url:
                return url.split("file/d/")[1].split("/")[0].strip()
            return None

        while True:
            if not os.path.exists("playlist.m3u"):
                print("Error: playlist.m3u not found!")
                time.sleep(10)
                continue

            with open("playlist.m3u", "r") as f:
                lines = f.readlines()

            urls = [line.strip() for line in lines if line.strip().startswith("http")]
            
            if not urls:
                print("No URLs found in playlist.m3u")
                time.sleep(5)
                continue

            for count, url in enumerate(urls, 1):
                file_id = get_gdrive_id(url)
                if not file_id:
                    print(f"Skipping invalid URL: {url}")
                    continue

                filename = f"video_{count}.mp4"
                print(f"Downloading Video {count} (ID: {file_id})...")
                
                # gdown ko run karna python se
                download_cmd = f'gdown --id {file_id} -O {filename} --remaining-ok --quiet'
                res = os.system(download_cmd)

                if os.path.exists(filename) and os.path.getsize(filename) > 1000:
                    print(f"Video {count} downloaded successfully. Starting FFmpeg stream...")
                    
                    ffmpeg_cmd = [
                        "ffmpeg", "-re", "-i", filename, "-i", "https://i.ibb.co/6wG6YV6/logo.png",
                        "-filter_complex", "[1:v]scale=120:-1[logo];[0:v][logo]overlay=W-w-10:10",
                        "-c:v", "libx264", "-preset", "veryfast", "-b:v", "1200k", "-maxrate", "1200k", "-bufsize", "2400k",
                        "-c:a", "aac", "-b:a", "128k", "-ar", "44100",
                        "-f", "mpegts", "http://127.0.0.1:8080/live"
                    ]
                    
                    # FFmpeg chalana aur khatam hone ka intezar karna
                    subprocess.run(ffmpeg_cmd)
                else:
                    print(f"Failed to download Video {count}")

                # Safai taaki space full na ho
                if os.path.exists(filename):
                    os.remove(filename)
        EOF
        
        python3 stream_runner.py
