name: 24-7 Animex Zone Cloud Streamer (Serveo)

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install FFmpeg and Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg curl

    - name: Start Stream Server and Expose Link
      run: |
        echo "Starting Local Server on Port 8080..."
        
        # Background loop taaki video background mein chalti rahe
        while true; do
          count=1
          grep -E '^https?://' playlist.m3u | while read -r url; do
            filename="video_${count}.mp4"
            echo "Downloading Video $count from GitHub Releases..."
            
            curl -L "$url" -o "$filename"
            
            if [ -f "$filename" ] && [ -s "$filename" ]; then
              echo "Video $count downloaded successfully! Streaming to port 8080..."
              
              ffmpeg -re -i "$filename" -i logo.png \
              -filter_complex "[1:v]scale=120:-1[logo];[0:v][logo]overlay=W-w-10:10" \
              -c:v libx264 -preset veryfast -b:v 1200k -maxrate 1200k -bufsize 2400k \
              -c:a aac -b:a 128k -ar 44100 \
              -f mpegts http://127.0.0.1:8080 || echo "Moving next..."
            else
              echo "Error downloading Video $count"
            fi
            
            rm -f "$filename"
            count=$((count+1))
          done
          sleep 5
        done &

        echo "Waiting for FFmpeg to initialize..."
        sleep 5

        echo "--------------------------------------------------------"
        echo "🚀 AAPKA VLC LIVE LINK NEECHE GENERATE HO RAHA HAI 🚀"
        echo "--------------------------------------------------------"
        
        # Serveo ka automatic tunnel link create karne ki command
        ssh -o StrictHostKeyChecking=no -R animexzone:80:127.0.0.1:8080 serveo.net
