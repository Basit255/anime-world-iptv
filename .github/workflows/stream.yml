name: 24-7 Animex Zone Auto-Bypass Streamer

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install FFmpeg and Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg curl unzip python3-pip
        pip3 install gdown --break-system-packages

    - name: Download and Install Localtonet
      run: |
        curl -L https://localtonet.com/download/localtonet-linux-x64.zip -o localtonet.zip
        unzip localtonet.zip
        chmod +x localtonet

    - name: Start Localtonet Tunnel
      env:
        LOCALTONET_AUTH_TOKEN: ${{ secrets.LOCALTONET_AUTH_TOKEN }}
      run: |
        ./localtonet -token $LOCALTONET_AUTH_TOKEN -protocol http -port 8080 > /dev/null 2>&1 &
        sleep 10

    - name: Ultimate Gdown Bypass Stream
      run: |
        echo "Starting Google Drive Ultimate Streamer..."
        
        while true; do
          count=1
          # playlist.m3u se ek ek karke video links read karna
          grep -E '^https?://' playlist.m3u | while read -r url; do
            filename="video_${count}.mp4"
            echo "----------------------------------------"
            echo "Downloading Video $count using Clean Gdown..."
            
            # Gdown bina kisi crash flag ke direct pure URL ko handle karega
            gdown "$url" -o "$filename" --fuzzy
            
            # Check karna ki asli video download hui hai ya nahi (Size check > 5MB)
            if [ -f "$filename" ] && [ $(stat -c%s "$filename") -gt 5000000 ]; then
              echo "Success: Video $count downloaded completely! Starting stream..."
              
              ffmpeg -re -i "$filename" -i "https://i.ibb.co/6wG6YV6/logo.png" \
              -filter_complex "[1:v]scale=120:-1[logo];[0:v][logo]overlay=W-w-10:10" \
              -c:v libx264 -preset veryfast -b:v 1200k -maxrate 1200k -bufsize 2400k \
              -c:a aac -b:a 128k -ar 44100 \
              -f mpegts http://127.0.0.1:8080/live || echo "Stream stopped, moving next..."
            else
              echo "Warning: Download failed or Google Drive warning page received for Video $count."
              echo "Trying alternative direct curl approach..."
              
              # Fallback agar gdown ko bhi drive block kare
              FILE_ID=$(echo "$url" | grep -oP '(id=|/d/)\K[^&\s/]+')
              curl -L "https://docs.google.com/uc?export=download&id=${FILE_ID}" -o "$filename"
              
              if [ -f "$filename" ] && [ $(stat -c%s "$filename") -gt 5000000 ]; then
                echo "Fallback download success! Streaming..."
                ffmpeg -re -i "$filename" -i "https://i.ibb.co/6wG6YV6/logo.png" \
                -filter_complex "[1:v]scale=120:-1[logo];[0:v][logo]overlay=W-w-10:10" \
                -c:v libx264 -preset veryfast -b:v 1200k -maxrate 1200k -bufsize 2400k \
                -c:a aac -b:a 128k -ar 44100 \
                -f mpegts http://127.0.0.1:8080/live || echo "Next"
              fi
            fi
            
            # Storage clear rakhne ke liye safai
            rm -f "$filename"
            count=$((count+1))
          done
          echo "Playlist finished, restarting loop..."
          sleep 5
        done
